<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Multi Level Table</title>
</head>
<body>

<table border="1">
<caption>My Multi Level Table</caption>
    <thead>
        <tr>

        </tr>
    </thead>
    <tbody>
            <td colspan="2" rowspan="2">Column 0</td>
            <td rowspan="2">Column 1</td>
            <td colspan="2">Column 2</td>
        <tr>
            <td>Column 2a</td>
            <td>Column2b</td>
        </tr>
        <tr>
            <td rowspan="2">Row 1</td>
            <td>Row 1a</td>
            <td>123</td>
            <td>456</td>
            <td>789</td>
        </tr>
        <tr>
            <td>Row 1b</td>
            <td>123</td>
            <td>456</td>
            <td>789</td>
        </tr>
        <tr>
            <td colspan="2">Row 2</td>
            <td>123</td>
            <td>456</td>
            <td>789</td>
        </tr>
    </tbody>
</table>

</body>
</html>
