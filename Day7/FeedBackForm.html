<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed Back Form</title>
</head>
<body>
    <h1>Feedback Form</h1>
    <form>
        <label for="name">Your Name:</label>
        <input type="text" name="uname" id="name" required>
        <br>
        <br>
        <label for="email">Your Email:</label>
        <input type="email" name="eemail" id="email" required>
        <br>
        <br>
        <label>Rate Us:</label>
        <input type="radio" name="Rate Us" id="1star" value="1star">
        <label for="1star">1 Star</label>
        <input type="radio" name="Rate Us" id="2star" value="2star">
        <label for="2star">2 Stars</label>
        <input type="radio" name="Rate Us" id="3star" value="3star">
        <label for="3star">3 Stars</label>
        <input type="radio" name="Rate Us" id="4star" value="4star">
        <label for="4star">4 Stars</label>
        <input type="radio" name="Rate Us" id="5star" value="5star">
        <label for="5star">5 Stars</label>
        <br>
        <br>
        <label for="textarea">Comments:</label>
        <textarea type="text" name="ecomment" id="textare" rows="5" cols="29"></textarea>
        <br>
        <br>
        <button type="submit">Submit Feedback</button>
    </form>
</body>
</html>
